<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}E-commerce{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --earth-50: #f7f7f3;
        --earth-100: #efece4;
        --earth-200: #e2d9c9;
        --earth-500: #7a6b54;
        --accent: #9aa27a;
      }
      body {
        background: linear-gradient(180deg, var(--earth-50), #fff 60%);
      }
      .spinner {
        border: 4px solid rgba(0, 0, 0, 0.06);
        border-top-color: rgba(122, 107, 84, 0.95);
        border-radius: 9999px;
        width: 44px;
        height: 44px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      pre.code-block {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>

    {% block head %}{% endblock %}
  </head>

  <body class="min-h-screen antialiased text-gray-800">
    <!-- Layout container -->
    <div class="max-w-6xl mx-auto px-6 py-10">
      <!-- Header -->
      <header class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 flex items-center justify-center">
            <svg
              id="site-logo-svg"
              viewBox="0 0 48 48"
              xmlns="http://www.w3.org/2000/svg"
              role="img"
              aria-label="E-commerce bag"
              class="w-full h-full"
            >
              <!-- bag body -->
              <rect
                x="6"
                y="12"
                width="36"
                height="28"
                rx="4"
                fill="var(--earth-500)"
              />
              <!-- handle -->
              <path
                d="M16 14 C16 8 32 8 32 14"
                stroke="#ffffff"
                stroke-width="2.5"
                fill="none"
                stroke-linecap="round"
              />
              <!-- centered E -->
              <text
                x="50%"
                y="62%"
                text-anchor="middle"
                dominant-baseline="middle"
                fill="#ffffff"
                font-weight="700"
                font-size="18"
              >
                E
              </text>
            </svg>
          </div>
          <script>
            (function () {
              const svg = document.getElementById("site-logo-svg");
              if (!svg) return;
              const serializer = new XMLSerializer();
              let svgStr = serializer.serializeToString(svg);
              if (!svgStr.includes("xmlns")) {
                svgStr = svgStr.replace(
                  "<svg",
                  '<svg xmlns="http://www.w3.org/2000/svg"',
                );
              }
              const dataUrl =
                "data:image/svg+xml;charset=utf-8," +
                encodeURIComponent(svgStr);
              let link = document.querySelector('link[rel~="icon"]');
              if (!link) {
                link = document.createElement("link");
                link.rel = "icon";
                document.head.appendChild(link);
              }
              link.href = dataUrl;
            })();
          </script>
          <div>
            <h1 class="text-2xl font-semibold">E-commerce</h1>
          </div>
        </div>

        <nav class="text-sm text-gray-600 space-x-4">
          <a href="/" class="hover:underline">Home</a>
          <a href="/scrape" class="hover:underline">Scrape</a>
          <a href="/my-products" class="hover:underline">My Products</a>
        </nav>
      </header>

      <main class="bg-white rounded-lg shadow p-6">
        {% block content %}{% endblock %}
      </main>

      <footer class="mt-8 text-sm text-gray-500 text-center">
        Made for a class project.
      </footer>
    </div>

    <!-- Global overlay (used by scrape page but available everywhere) -->
    <div
      id="loading-overlay"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center z-40"
    >
      <div
        class="bg-white/95 p-6 rounded-md shadow-lg flex flex-col items-center gap-3"
      >
        <div class="spinner"></div>
        {% block loading_message %}{% endblock %}
      </div>
    </div>

    {% block scripts %}{% endblock %}
  </body>
</html>
