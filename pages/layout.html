<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}E-commerce{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --earth-50: #f7f7f3;
        --earth-100: #efece4;
        --earth-200: #e2d9c9;
        --earth-500: #7a6b54;
        --accent: #9aa27a;
      }
      body {
        background: linear-gradient(180deg, var(--earth-50), #fff 60%);
      }
      .spinner {
        border: 4px solid rgba(0, 0, 0, 0.06);
        border-top-color: rgba(122, 107, 84, 0.95);
        border-radius: 9999px;
        width: 44px;
        height: 44px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      pre.code-block {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>

    {% block head %}{% endblock %}
  </head>

  <body class="min-h-screen antialiased text-gray-800">
    <!-- Layout container -->
    <div class="max-w-6xl mx-auto px-6 py-10">
      <!-- Header -->
      <header class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 rounded-md bg-[var(--earth-500)] flex items-center justify-center text-white font-semibold"
          >
            E
          </div>
          <div>
            <h1 class="text-2xl font-semibold">E-commerce</h1>
          </div>
        </div>

        <nav class="text-sm text-gray-600 space-x-4">
          <a href="/dashboard" class="hover:underline">Dashboard</a>
          <a href="/scrape" class="hover:underline">Scrape</a>
          <a href="/data" class="hover:underline">Data</a>
        </nav>
      </header>

      <main class="bg-white rounded-lg shadow p-6">
        {% block content %}{% endblock %}
      </main>

      <footer class="mt-8 text-sm text-gray-500 text-center">
        Made for a class project.
      </footer>
    </div>

    <!-- Global overlay (used by scrape page but available everywhere) -->
    <div
      id="loading-overlay"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center z-40"
    >
      <div
        class="bg-white/95 p-6 rounded-md shadow-lg flex flex-col items-center gap-3"
      >
        <div class="spinner"></div>
        {% block loading_message %}{% endblock %}
      </div>
    </div>

    {% block scripts %}{% endblock %}
  </body>
</html>
